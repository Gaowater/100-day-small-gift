<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>固定定位测试</title>
    <style>
        /* 单独测试固定定位的样式 */
        .settings-link {
            position: fixed;
            top: 32px;
            left: 28px;
            z-index: 998;
            font-size: 18px;
            color: #d4c0a8;
            text-decoration: none;
            border: none;
            letter-spacing: 1px;
            background-color: rgba(0,0,0,0.1); /* 加个淡背景方便看到 */
            padding: 5px;
        }

        /* 模拟长内容让页面可以滚动 */
        .spacer {
            height: 2000px;
            background: linear-gradient(to bottom, #fef9f0, #fdf3e4);
        }
    </style>
</head>
<body>
    <!-- 测试用的设置图标 -->
    <a href="#" class="settings-link" title="设置">⚙️ 设置图标测试</a>

    <!-- 模拟长内容 -->
    <div class="spacer">
        <p style="padding: 20px; color: #5c4b3a;">向下滚动，看看左上角的设置图标会不会跟着动。如果不动，说明固定定位生效。</p>
    </div>
</body>
</html>
