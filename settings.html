<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 · 100天</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            background: linear-gradient(180deg, #fef9f0 0%, #fdf3e4 30%, #fef9f0 100%);
            min-height: 100vh;
            color: #5c4b3a;
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        .back-link {
            position: absolute;
            top: 32px;
            left: 28px;
            z-index: 998;
            font-size: 18px;
            color: #d4c0a8;
            text-decoration: none;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }
        .back-link:hover { color: #b8937a; }

        .page-title {
            text-align: center;
            font-size: 20px;
            font-weight: 400;
            color: #b8937a;
            letter-spacing: 4px;
            margin-bottom: 40px;
            padding-top: 20px;
        }

        .setting-group {
            margin-bottom: 32px;
        }

        .setting-group-title {
            font-size: 11px;
            color: #c4a88c;
            letter-spacing: 2px;
            margin-bottom: 10px;
            padding-left: 8px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fffdf9;
            border-radius: 12px;
            padding: 16px 18px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s ease;
            box-shadow: 0 1px 6px rgba(180, 150, 120, 0.06);
        }
        .setting-item:hover {
            background: #fdf7ef;
        }
        .setting-item span:first-child {
            font-size: 15px;
            color: #5c4b3a;
            letter-spacing: 1px;
        }
        .setting-arrow {
            font-size: 18px;
            color: #d4b896;
        }

        .theme-colors {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .color-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }
        .color-dot:hover {
            transform: scale(1.1);
        }
        .color-dot.active {
            border-color: #8b7560;
        }
        .color-warm { background: #c49a6c; }
        .color-pink { background: #c08080; }
        .color-blue { background: #8098b0; }
        .color-green { background: #80a080; }
        .color-purple { background: #9880b0; }
        .color-gray { background: #a0a0a0; }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(60, 40, 25, 0.88);
            color: #fef9f0;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            letter-spacing: 2px;
            z-index: 3000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        @media (max-width: 480px) {
            .container {
                padding: 24px 14px 40px;
            }
            .setting-item {
                padding: 14px 16px;
            }
        }

        /* ========== 创作者的话 - 密码弹窗 ========== */
        .creator-password-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 4000;
            align-items: center;
            justify-content: center;
        }
        .creator-password-box {
            background: #1a1a2e;
            border: 1px solid #3a3a58;
            border-radius: 16px;
            padding: 32px 28px 24px;
            width: 280px;
            text-align: center;
            position: relative;
        }
        .creator-password-close {
            position: absolute;
            top: 8px; right: 14px;
            font-size: 26px;
            color: #888;
            cursor: pointer;
        }
        .creator-password-title {
            font-size: 16px;
            color: #c8c0b8;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .creator-password-input {
            width: 100%;
            padding: 10px 14px;
            background: #252540;
            border: 1px solid #3a3a58;
            border-radius: 8px;
            color: #e0d8d0;
            font-size: 16px;
            text-align: center;
            outline: none;
            margin-bottom: 16px;
        }
        .creator-password-input:focus { border-color: #9080b0; }
        .creator-password-btn {
            width: 100%;
            padding: 10px;
            background: #3a3a58;
            border: none;
            border-radius: 8px;
            color: #d0c8c0;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
        }
        .creator-password-btn:hover { background: #4a4a6a; }
        .creator-password-error {
            font-size: 12px;
            color: #c06060;
            margin-top: 10px;
            min-height: 18px;
        }

        /* ========== 创作者的话 - 内容页 ========== */
        .creator-note-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 4001;
            align-items: center;
            justify-content: center;
        }
        .creator-note-box {
            background: #1a1a2e;
            border: 1px solid #3a3a58;
            border-radius: 16px;
            padding: 32px 24px;
            width: 320px;
            max-height: 70vh;
            overflow-y: auto;
            position: relative;
            text-align: center;
        }
        .creator-note-close {
            position: absolute;
            top: 8px; right: 14px;
            font-size: 26px;
            color: #888;
            cursor: pointer;
        }
        .creator-note-title {
            font-size: 18px;
            color: #e0d8c8;
            letter-spacing: 3px;
            margin-bottom: 18px;
        }
        .creator-note-content {
            font-size: 15px;
            color: #c8c0b0;
            line-height: 2;
            letter-spacing: 1px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <!-- 返回 -->
    <a href="index.html" class="back-link" title="返回">← 返回</a>

    <div class="container">
        <h1 class="page-title">设 置</h1>

        <!-- 主题色 -->
        <div class="setting-group">
            <p class="setting-group-title">主题色</p>
            <div class="theme-colors" id="themeColors">
                <div class="color-dot color-warm" data-theme="warm"></div>
                <div class="color-dot color-pink" data-theme="pink"></div>
                <div class="color-dot color-blue" data-theme="blue"></div>
                <div class="color-dot color-green" data-theme="green"></div>
                <div class="color-dot color-purple" data-theme="purple"></div>
                <div class="color-dot color-gray" data-theme="gray"></div>
            </div>
        </div>

        <!-- 其他设置 -->
        <div class="setting-group">
            <p class="setting-group-title">其他</p>
            <div class="setting-item" id="resetMood">
                <span>重置她的心情</span>
                <span class="setting-arrow">›</span>
            </div>
            <div class="setting-item" id="creatorNoteTrigger">
                <span>创作者的话</span>
                <span class="setting-arrow">›</span>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <!-- 创作者的话 - 密码弹窗 -->
    <div class="creator-password-overlay" id="creatorPasswordOverlay">
        <div class="creator-password-box">
            <span class="creator-password-close" id="creatorPasswordClose">&times;</span>
            <p class="creator-password-title">🔒 输入密码</p>
            <input type="password" class="creator-password-input" id="creatorPasswordInput" placeholder="请输入密码">
            <button class="creator-password-btn" id="creatorPasswordBtn">确认</button>
            <p class="creator-password-error" id="creatorPasswordError"></p>
        </div>
    </div>

    <!-- 创作者的话 - 内容页 -->
    <div class="creator-note-overlay" id="creatorNoteOverlay">
        <div class="creator-note-box">
            <span class="creator-note-close" id="creatorNoteClose">&times;</span>
            <p class="creator-note-title">创作者的话</p>
            <div class="creator-note-content" id="creatorNoteContent">
                啊啊啊！我好想和你待在一起啊！2026.5.20
            </div>
        </div>
    </div>

    <script>
        // ========== Toast ==========
        const toast = document.getElementById('toast');
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1800);
        }

        // ========== 主题色 ==========
        const currentTheme = localStorage.getItem('dayTheme') || 'warm';
        document.querySelectorAll('.color-dot').forEach(dot => {
            if (dot.getAttribute('data-theme') === currentTheme) {
                dot.classList.add('active');
            }
            dot.addEventListener('click', function() {
                const theme = this.getAttribute('data-theme');
                localStorage.setItem('dayTheme', theme);
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                this.classList.add('active');
                showToast('主题已切换，刷新主页生效');
            });
        });

        // ========== 重置她的心情 ==========
        document.getElementById('resetMood').addEventListener('click', function() {
            localStorage.removeItem('herMood');
            showToast('心情已重置');
        });

        // ========== 创作者的话 ==========
        const CREATOR_PASSWORD = 'IWANTTOSTAYWITHYOU';

        document.getElementById('creatorNoteTrigger').addEventListener('click', function() {
            document.getElementById('creatorPasswordOverlay').style.display = 'flex';
            document.getElementById('creatorPasswordInput').value = '';
            document.getElementById('creatorPasswordError').textContent = '';
            setTimeout(() => document.getElementById('creatorPasswordInput').focus(), 100);
        });

        document.getElementById('creatorPasswordClose').addEventListener('click', function() {
            document.getElementById('creatorPasswordOverlay').style.display = 'none';
        });

        document.getElementById('creatorPasswordOverlay').addEventListener('click', function(e) {
            if (e.target === this) this.style.display = 'none';
        });

        document.getElementById('creatorPasswordBtn').addEventListener('click', function() {
            const input = document.getElementById('creatorPasswordInput');
            if (input.value === CREATOR_PASSWORD) {
                document.getElementById('creatorPasswordOverlay').style.display = 'none';
                document.getElementById('creatorNoteOverlay').style.display = 'flex';
            } else {
                document.getElementById('creatorPasswordError').textContent = '密码错误';
                input.value = '';
            }
        });

        document.getElementById('creatorPasswordInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('creatorPasswordBtn').click();
        });

        document.getElementById('creatorNoteClose').addEventListener('click', function() {
            document.getElementById('creatorNoteOverlay').style.display = 'none';
        });

        document.getElementById('creatorNoteOverlay').addEventListener('click', function(e) {
            if (e.target === this) this.style.display = 'none';
        });
    </script>
</body>
</html>
