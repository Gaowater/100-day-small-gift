<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100天</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 背景音乐 -->
    <audio id="bgm" loop autoplay muted playsinline>
        <source src="bgm.mp3" type="audio/mpeg">
    </audio>

    <!-- 随机句子弹出 -->
    <div class="shake-toast" id="shakeToast"></div>

    <!-- 流星雨容器 -->
    <div class="meteor-container" id="meteorContainer"></div>

    <!-- 昼夜切换图标 -->
    <div class="theme-toggle" id="themeToggle" title="切换昼夜">
        <div class="toggle-icon">
            <div class="sun">
                <div class="sun-core"></div>
                <div class="sun-ray r1"></div>
                <div class="sun-ray r2"></div>
                <div class="sun-ray r3"></div>
                <div class="sun-ray r4"></div>
                <div class="sun-ray r5"></div>
                <div class="sun-ray r6"></div>
                <div class="sun-ray r7"></div>
                <div class="sun-ray r8"></div>
            </div>
            <div class="moon">
                <div class="moon-body"></div>
                <div class="moon-crater c1"></div>
                <div class="moon-crater c2"></div>
                <div class="moon-crater c3"></div>
                <div class="moon-crater c4"></div>
                <div class="moon-shadow"></div>
            </div>
            <div class="cloud c1"></div>
            <div class="cloud c2"></div>
            <div class="toggle-star s1"></div>
            <div class="toggle-star s2"></div>
            <div class="toggle-star s3"></div>
            <div class="toggle-star s4"></div>
            <div class="toggle-star s5"></div>
        </div>
    </div>

    <!-- 音乐开关按钮 -->
    <div class="music-toggle" id="musicBtn" title="音乐开关">
        <span class="music-icon-on">🔊</span>
        <span class="music-icon-off" style="display:none;">🔇</span>
    </div>

    <div class="container">
        <!-- 顶部 -->
        <header class="header" id="headerArea">
            <div class="stars-container" id="starsContainer"></div>
            <div class="days-badge">
                <span class="days-number" id="daysCount">100</span>
                <span class="days-label">天</span>
            </div>
            <p class="subtitle">始于 2026.02.07</p>
            <p class="hint-text" id="headerHint">✨ 双击这里</p>
        </header>

        <!-- 卡片区域 -->
        <div class="cards" id="cardsContainer"></div>

        <!-- 底部 -->
        <footer class="footer">
            <p id="todayDate"></p>
        </footer>
    </div>

    <!-- 相册弹窗 -->
    <div class="album-overlay" id="albumOverlay">
        <div class="album-modal">
            <span class="album-close">&times;</span>
            <div class="album-grid"></div>
            <div class="album-video">
                <video controls playsinline>
                    <source src="video.mp4" type="video/mp4">
                    你的浏览器不支持视频播放
                </video>
            </div>
        </div>
    </div>

    <!-- 图片灯箱 -->
    <div class="lightbox" id="lightbox" style="display:none;">
        <span class="lightbox-close">&times;</span>
        <img src="" alt="放大图片">
    </div>

    <script src="config.js"></script>
    <script>
        // ========== 计算天数 ==========
        const startDate = new Date('2026-02-07');
        const today = new Date();
        const diffDays = Math.floor((today - startDate) / (1000 * 60 * 60 * 24)) + 1;
        document.getElementById('daysCount').textContent = diffDays >= 1 ? diffDays : 1;
        document.getElementById('todayDate').textContent = `今天 ${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日`;

        // ========== 随机句子池（50句，积极向上，不含爱情） ==========
        const shakeQuotes = [
            "今天也是元气满满的一天", "阳光正好，微风不燥", "每一步都算数", "好事正在发生",
            "你比想象中更坚强", "今天也要加油呀", "生活总会给你惊喜", "保持热爱，奔赴山海",
            "慢慢来，比较快", "今天很好，明天会更好", "做自己的小太阳", "努力的人运气不会太差",
            "一切都会好起来的", "笑一个吧，没什么大不了", "今天也是值得的一天", "往前走，别回头",
            "你很棒，真的", "每天都是新的开始", "加油，你可以的", "生活会奖励努力的人",
            "别急，花会开的", "坚持就是胜利", "明天又是崭新的一天", "保持微笑，好运自来",
            "今天的努力是明天的底气", "相信自己，你能行", "每个平凡的日子都在发光", "未来可期",
            "一步一个脚印", "累了就休息，但别放弃", "抬头看看天空吧", "生活明朗，万物可爱",
            "好运气正在路上", "今天辛苦了，明天继续", "你是独一无二的", "风雨过后有彩虹",
            "种一棵树最好的时间是现在", "不要慌，月亮也在慢慢升", "今天的烦恼今天过", "做一个温暖的人",
            "世界很大，你很珍贵", "保持好奇心", "每天进步一点点", "认真生活的人最可爱",
            "明天见，更好的你", "时光不负有心人", "做你喜欢的事", "简单点，快乐点",
            "新的一天，新的开始", "愿你今天有个好心情"
        ];

        // ========== 生成卡片 ==========
        const container = document.getElementById('cardsContainer');
        cardsData.forEach((card, index) => {
            const cardEl = document.createElement('div');
            cardEl.className = 'card';
            cardEl.setAttribute('data-index', index);
            let hintHTML = '';
            if (index === 4) hintHTML = '<p class="card-hint">✦ 双击这里</p>';
            if (index === 6) hintHTML = '<p class="card-hint">✦ 双击这里</p>';
            cardEl.innerHTML = `
                <div class="card-image" onclick="openLightbox('images/${card.image}')">
                    <img src="images/${card.image}" alt="${card.title || '图片' + (index + 1)}" loading="lazy">
                </div>
                <div class="card-content">
                    ${card.title ? `<h3 class="card-title">${card.title}</h3>` : ''}
                    <p class="card-text">${card.text}</p>
                    ${hintHTML}
                </div>
            `;
            if (index === 4) cardEl.addEventListener('dblclick', e => { e.preventDefault(); openAlbum(); });
            if (index === 6) cardEl.addEventListener('dblclick', e => { e.preventDefault(); openSingleImage('images/album/secret.jpg'); });
            container.appendChild(cardEl);
        });

        // ========== 图片灯箱 ==========
        function openLightbox(src) {
            const lb = document.getElementById('lightbox');
            lb.style.display = 'flex';
            lb.querySelector('img').src = src;
        }
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this || e.target.className === 'lightbox-close') this.style.display = 'none';
        });

        // ========== 相册 ==========
        function openAlbum() {
            const overlay = document.getElementById('albumOverlay');
            const grid = overlay.querySelector('.album-grid');
            grid.innerHTML = '';
            ['a7.jpg','a8.jpg','a9.jpg','a10.jpg','a11.jpg','a12.jpg'].forEach(photo => {
                const img = document.createElement('img');
                img.src = 'images/album/' + photo;
                img.alt = '相册照片';
                img.loading = 'lazy';
                img.onclick = () => openLightbox('images/album/' + photo);
                grid.appendChild(img);
            });
            overlay.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
        document.getElementById('albumOverlay').addEventListener('click', function(e) {
            if (e.target === this || e.target.className === 'album-close') {
                this.style.display = 'none';
                document.body.style.overflow = '';
                const v = this.querySelector('video');
                if (v) v.pause();
            }
        });

        // ========== 单张图片弹出 ==========
        function openSingleImage(src) {
            const overlay = document.createElement('div');
            overlay.className = 'single-image-overlay';
            overlay.innerHTML = `<span class="single-image-close">&times;</span><img src="${src}" alt="照片">`;
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay || e.target.className === 'single-image-close') {
                    overlay.remove();
                    document.body.style.overflow = '';
                }
            });
            document.body.appendChild(overlay);
            document.body.style.overflow = 'hidden';
        }

        // ========== 星光特效 ==========
        const headerArea = document.getElementById('headerArea');
        const starsContainer = document.getElementById('starsContainer');
        const headerHint = document.getElementById('headerHint');
        let starsActive = false;
        function createStars() {
            starsContainer.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                const star = document.createElement('div');
                star.className = 'star-particle';
                star.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${2+Math.random()*4}px;height:${2+Math.random()*4}px;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*4}s;`;
                starsContainer.appendChild(star);
            }
        }
        headerArea.addEventListener('dblclick', e => {
            e.preventDefault();
            if (!starsActive) {
                starsActive = true;
                headerArea.classList.add('stars-active');
                headerHint.textContent = '✨ 星光已点亮';
                createStars();
                setTimeout(() => headerHint.style.opacity = '0.4', 2000);
            }
        });

        // ========== 昼夜切换 ==========
        const themeToggle = document.getElementById('themeToggle');
        let isNight = false;
        themeToggle.addEventListener('click', () => {
            isNight = !isNight;
            if (isNight) {
                document.body.classList.add('night-mode');
                if (!starsActive) {
                    starsActive = true;
                    headerArea.classList.add('stars-active');
                    headerHint.textContent = '✨ 星光已点亮';
                    createStars();
                    setTimeout(() => headerHint.style.opacity = '0.4', 2000);
                }
            } else {
                document.body.classList.remove('night-mode');
            }
        });

        // ========== 音乐 ==========
        const bgm = document.getElementById('bgm');
        const musicBtn = document.getElementById('musicBtn');
        const iconOn = document.querySelector('.music-icon-on');
        const iconOff = document.querySelector('.music-icon-off');
        let musicPlaying = true;
        bgm.muted = false;
        bgm.volume = 0.5;
        bgm.play().catch(() => {
            musicPlaying = false;
            iconOn.style.display = 'none';
            iconOff.style.display = 'inline';
        });
        musicBtn.addEventListener('click', () => {
            if (musicPlaying) {
                bgm.pause();
                iconOn.style.display = 'none';
                iconOff.style.display = 'inline';
            } else {
                bgm.play();
                iconOn.style.display = 'inline';
                iconOff.style.display = 'none';
            }
            musicPlaying = !musicPlaying;
        });

        // ========== 摇一摇彩蛋 ==========
        const shakeToast = document.getElementById('shakeToast');
        const meteorContainer = document.getElementById('meteorContainer');
        const allCards = document.querySelectorAll('.card');
        let shakeCooldown = false;
        let lastShakeTime = 0;
        const SHAKE_THRESHOLD = 15;
        const SHAKE_COOLDOWN = 3000;

        function triggerCardShake() {
            allCards.forEach(card => {
                card.classList.add('card-shake');
                setTimeout(() => card.classList.remove('card-shake'), 600);
            });
        }

        function showRandomQuote() {
            const quote = shakeQuotes[Math.floor(Math.random() * shakeQuotes.length)];
            shakeToast.textContent = quote;
            shakeToast.classList.add('show');
            setTimeout(() => shakeToast.classList.remove('show'), 2500);
        }

        function triggerMeteorShower() {
            meteorContainer.innerHTML = '';
            const count = 8 + Math.floor(Math.random() * 7);
            for (let i = 0; i < count; i++) {
                const meteor = document.createElement('div');
                meteor.className = 'meteor';
                const top = Math.random() * 60;
                const left = Math.random() * 90;
                const delay = Math.random() * 1.5;
                const duration = 0.6 + Math.random() * 0.8;
                const size = 1.5 + Math.random() * 2.5;
                meteor.style.cssText = `
                    top: ${top}%;
                    left: ${left}%;
                    width: ${size * 30}px;
                    height: ${size}px;
                    animation-delay: ${delay}s;
                    animation-duration: ${duration}s;
                `;
                meteorContainer.appendChild(meteor);
            }
            const totalTime = 1500 + count * 200;
            shakeCooldown = true;
            setTimeout(() => {
                meteorContainer.innerHTML = '';
                shakeCooldown = false;
            }, totalTime);
        }

        function handleShake() {
            const now = Date.now();
            if (shakeCooldown) return;
            if (now - lastShakeTime < SHAKE_COOLDOWN) return;
            lastShakeTime = now;
            triggerCardShake();
            if (isNight) {
                triggerMeteorShower();
            } else {
                showRandomQuote();
            }
        }

        // 设备陀螺仪摇动检测
        if (window.DeviceMotionEvent) {
            let lastX = 0, lastY = 0, lastZ = 0;
            window.addEventListener('deviceorientation', e => {
                const x = e.beta || 0, y = e.gamma || 0, z = e.alpha || 0;
                const diff = Math.abs(x - lastX) + Math.abs(y - lastY) + Math.abs(z - lastZ);
                if (diff > 50) handleShake();
                lastX = x; lastY = y; lastZ = z;
            });
        }

        // 桌面端：连续快速晃动鼠标作为替代
        let mouseShakeCount = 0;
        let mouseShakeTimer = null;
        let lastMouseX = 0, lastMouseY = 0;
        document.addEventListener('mousemove', e => {
            const diff = Math.abs(e.clientX - lastMouseX) + Math.abs(e.clientY - lastMouseY);
            if (diff > 100) {
                mouseShakeCount++;
                if (mouseShakeCount >= 5) {
                    handleShake();
                    mouseShakeCount = 0;
                }
                clearTimeout(mouseShakeTimer);
                mouseShakeTimer = setTimeout(() => mouseShakeCount = 0, 800);
            }
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });
    </script>
</body>
</html>
